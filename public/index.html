<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B0E14" />

    <!-- ══ PRIMARY SEO ══ -->
    <title>Escara Pay | India's Trusted Payment Protection Platform</title>
    <meta name="description" content="Escara Pay — India's trusted payment protection platform for WhatsApp & Instagram sellers. Stop RTO losses, prevent fraud, and protect every transaction with our secure token-based Safe Pay system." />
    <meta name="keywords" content="escara pay, escarapay, payment protection india, safe pay india, RTO protection sellers, whatsapp seller payment, buyer seller protection, secure online payment india, token payment system, fraud protection, COD alternative" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Escara Pay (India)" />
    <link rel="canonical" href="https://www.escarapay.in/" />

    <!-- ══ OPEN GRAPH (WhatsApp, Facebook preview) ══ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.escarapay.in/" />
    <meta property="og:site_name"   content="Escara Pay" />
    <meta property="og:title"       content="Escara Pay | India's Trusted Payment Protection Platform" />
    <meta property="og:description" content="Stop RTO losses & prevent fraud. Escara Pay holds payments safely until delivery is confirmed — protecting both buyers and sellers across India." />
    <meta property="og:image"       content="https://www.escarapay.in/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ══ TWITTER CARD ══ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Escara Pay | Safe Pay for Indian Sellers" />
    <meta name="twitter:description" content="Protect every WhatsApp & Instagram deal. Token-based payment protection — fraud-free, RTO-free." />
    <meta name="twitter:image"       content="https://www.escarapay.in/og-image.png" />

    <!-- ══ STRUCTURED DATA (Google Rich Results) ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Escara Pay",
      "alternateName": "EscaraPay",
      "url": "https://www.escarapay.in",
      "logo": "https://www.escarapay.in/logo192.png",
      "description": "India's trusted payment protection platform for WhatsApp and Instagram sellers. Secure token-based Safe Pay system to stop RTO losses and prevent fraud.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@escarapay.in",
        "contactType": "customer support",
        "availableLanguage": ["Hindi", "English"],
        "areaServed": "IN"
      },
      "sameAs": []
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Escara Pay",
      "url": "https://www.escarapay.in",
      "description": "Stop RTO losses and fraud with Escara Pay's token-based payment protection system for Indian sellers.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.escarapay.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ══ FONTS (preload for zero flash) ══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ══ FAVICON ══ -->
    <!--
      FAVICON INSTRUCTIONS:
      1. Go to https://favicon.io or https://realfavicongenerator.net
      2. Upload your EscaraPay logo
      3. Download the generated files
      4. Replace these files in your /public folder:
         - favicon.ico
         - logo192.png  (192x192)
         - logo512.png  (512x512)
         - apple-touch-icon.png (180x180)
    -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>
      Escara Pay requires JavaScript to run. Please enable JavaScript in your browser.
      <br/>
      Escara Pay ke liye JavaScript zaroori hai. Please browser mein JavaScript enable karein.
    </noscript>
    <div id="root"></div>
  </body>
</html>
